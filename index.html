<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a90e2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Counter</title>
  <style>
    * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
    html, body { height: 100%; }
    body { 
      display: flex; flex-direction: column; 
      align-items: center; justify-content: space-between;
      margin: 0; padding: 30px 20px;
      font-family: -apple-system, sans-serif;
      background: #f5f5f5;
    }
    
    /* 상단: 언어 선택 */
    .top-bar { width: 100%; display: flex; justify-content: center; }
    #lang {
      font-size: 16px; padding: 10px 18px;
      border: 2px solid #4a90e2; border-radius: 20px;
      background: white; color: #4a90e2; font-weight: bold;
      cursor: pointer;
    }
    
    /* 중앙: 숫자 + 버튼 */
    .center { 
      display: flex; flex-direction: column; 
      align-items: center; gap: 30px;
    }
    #count { 
      font-size: 110px; font-weight: bold; 
      color: #333; line-height: 1; margin: 0;
    }
    .buttons { display: flex; gap: 40px; }
    button.main { 
      width: 100px; height: 100px; font-size: 48px;
      border: none; border-radius: 50%;
      background: #4a90e2; color: white; cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.1s;
    }
    button.main:active { transform: scale(0.92); background: #357abd; }
    
    /* 하단: 토글 & 리셋 */
    .bottom-bar {
      width: 100%; display: flex; gap: 12px; 
      justify-content: center; flex-wrap: wrap;
    }
    .bottom-bar button {
      font-size: 14px; padding: 10px 16px;
      border-radius: 20px; cursor: pointer;
      background: white; font-weight: 600;
    }
    #soundBtn { border: 2px solid #ccc; color: #999; }
    #soundBtn.on { border-color: #4a90e2; color: #4a90e2; }
    #resetBtn { border: 2px solid #e74c3c; color: #e74c3c; }
    
    /* 음성 상태 표시 */
    #voiceInfo { 
      font-size: 11px; color: #999; margin-top: 8px; 
      text-align: center; width: 100%;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <select id="lang">
      <option value="ko-KR">🇰🇷 한국어</option>
      <option value="en-US">🇺🇸 English</option>
      <option value="zh-CN">🇨🇳 中文</option>
      <option value="ja-JP">🇯🇵 日本語</option>
    </select>
  </div>

  <div class="center">
    <div id="count">0</div>
    <div class="buttons">
      <button class="main" onclick="update(-1)">−</button>
      <button class="main" onclick="update(+1)">+</button>
    </div>
  </div>

  <div>
    <div class="bottom-bar">
      <button id="soundBtn" class="on">🔊 소리 ON</button>
      <button id="resetBtn">🔄 초기화</button>
    </div>
    <div id="voiceInfo">음성 로딩 중...</div>
  </div>

  <script>
    // ===== 상태 =====
    let count = Number(localStorage.getItem('count') || 0);
    let soundOn = localStorage.getItem('soundOn') !== 'false';
    let lang = localStorage.getItem('lang') || 'ko-KR';
    let voices = [];  // 음성 목록

    const el = document.getElementById('count');
    const langSel = document.getElementById('lang');
    const soundBtn = document.getElementById('soundBtn');
    const resetBtn = document.getElementById('resetBtn');
    const voiceInfo = document.getElementById('voiceInfo');

    el.textContent = count;
    langSel.value = lang;

    // ===== 언어별 라벨 =====
    const labels = {
      'ko-KR': { on: '🔊 소리 ON', off: '🔇 소리 OFF', reset: '🔄 초기화' },
      'en-US': { on: '🔊 Sound ON', off: '🔇 Sound OFF', reset: '🔄 Reset' },
      'zh-CN': { on: '🔊 声音 开', off: '🔇 声音 关', reset: '🔄 重置' },
      'ja-JP': { on: '🔊 音 ON', off: '🔇 音 OFF', reset: '🔄 リセット' },
    };

    function updateSoundUI() {
      const l = labels[lang] || labels['ko-KR'];
      soundBtn.textContent = soundOn ? l.on : l.off;
      soundBtn.classList.toggle('on', soundOn);
      resetBtn.textContent = l.reset;
    }

    // ===== 음성 목록 로드 (비동기) =====
    function loadVoices() {
      voices = speechSynthesis.getVoices();
      updateVoiceInfo();
    }
    
    function updateVoiceInfo() {
      const available = voices.filter(v => v.lang.startsWith(lang.split('-')[0]));
      if (available.length > 0) {
        voiceInfo.textContent = `✓ ${available[0].name} (${available[0].lang})`;
        voiceInfo.style.color = '#4a90e2';
      } else {
        voiceInfo.textContent = `⚠️ ${lang} 음성이 설치되지 않았습니다`;
        voiceInfo.style.color = '#e74c3c';
      }
    }

    // iOS/Android는 voiceschanged 이벤트 후에 음성 로드됨
    if ('speechSynthesis' in window) {
      loadVoices();
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    // ===== 핵심: 언어에 맞는 음성 찾기 =====
    function findVoice(targetLang) {
      if (voices.length === 0) voices = speechSynthesis.getVoices();
      
      // 1순위: 정확히 일치 (ko-KR === ko-KR)
      let v = voices.find(v => v.lang === targetLang);
      if (v) return v;
      
      // 2순위: 언어 코드만 일치 (ko === ko)
      const baseLang = targetLang.split('-')[0];
      v = voices.find(v => v.lang.startsWith(baseLang));
      if (v) return v;
      
      return null;
    }

    function speak(num) {
      if (!soundOn) return;
      if (!('speechSynthesis' in window)) return;
      
      speechSynthesis.cancel();
      
      const utter = new SpeechSynthesisUtterance(String(num));
      utter.lang = lang;
      
      // ⭐ 핵심: voice를 명시적으로 지정
      const voice = findVoice(lang);
      if (voice) {
        utter.voice = voice;
      } else {
        console.warn(`음성 없음: ${lang}`);
      }
      
      utter.rate = 1.1;
      utter.volume = 1;
      speechSynthesis.speak(utter);
    }

    // ===== 동작 =====
    function update(delta) {
      count += delta;
      el.textContent = count;
      localStorage.setItem('count', count);
      if (navigator.vibrate) navigator.vibrate(20);
      speak(count);
    }

    function toggleSound() {
      soundOn = !soundOn;
      localStorage.setItem('soundOn', soundOn);
      updateSoundUI();
      if (soundOn) speak(count);
    }

    function reset() {
      count = 0;
      el.textContent = count;
      localStorage.setItem('count', count);
      speak(count);
    }

    // ===== 이벤트 바인딩 (addEventListener 방식으로 변경) =====
    soundBtn.addEventListener('click', toggleSound);
    resetBtn.addEventListener('click', reset);

    langSel.addEventListener('change', (e) => {
      lang = e.target.value;
      localStorage.setItem('lang', lang);
      updateSoundUI();
      updateVoiceInfo();
      speak(count);  // 새 언어로 미리듣기
    });

    // 초기 UI
    updateSoundUI();

    // 서비스 워커
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
